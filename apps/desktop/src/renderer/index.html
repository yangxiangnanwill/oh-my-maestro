<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy
      https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP

      - default-src 'self': Only allow resources from same origin
      - script-src 'self' 'wasm-unsafe-eval': Allow scripts from same origin + WebAssembly (for xterm ImageAddon)
      - style-src 'self' 'unsafe-inline': Allow styles from same origin + inline (needed for CSS-in-JS)
      - connect-src 'self' data: blob: ws: wss: http://127.0.0.1:*: Allow WebSocket + data URIs + blob URIs + local host-service
      - img-src 'self' data: blob: https: http:: Allow images from any source
      - font-src 'self': Allow fonts from same origin
      - frame-src https: http: data: blob:: Allow webview browser pane to load any URL
      - child-src 'self' blob:: Allow workers from same origin + blob workers
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' data: blob: ws: wss: http://127.0.0.1:*; img-src 'self' data: blob: https: http:; font-src 'self'; frame-src https: http: data: blob:; child-src 'self' blob:;" />
    <title>Maestro IDE</title>
  </head>
  <body>
    <app></app>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
